version: "3.7"
services:
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_ENCRYPTION_KEY=replace-with-strong-random-hasamex
      - N8N_USER_FOLDER=/home/node/.n8n
      # Optional: Basic Auth for UI
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=replace-strong-pass-hasamex
      # Optional: use Postgres in prod (instead of default SQLite)
      # - DB_TYPE=postgresdb
      # - DB_POSTGRESDB_HOST=<db-host>
      # - DB_POSTGRESDB_PORT=5432
      # - DB_POSTGRESDB_DATABASE=<db-name>
      # - DB_POSTGRESDB_USER=<db-user>
      # - DB_POSTGRESDB_PASSWORD=<db-password>
    volumes:
      - n8n_data:/home/node/.n8n
volumes:
  n8n_data:
